name: MSYS2 (Windows)
on:
  push:
    branches:
      - main
      - 'v*'
  pull_request:

concurrency:
  group: ${{ github.ref }}-msys2
  cancel-in-progress: true

env:
  TEST_FILTER: "-4 --gtest_filter=-*LiveSearchTXT*:*LiveSearchANY*:*LiveSearchNS*:*LiveGetLocalhostByAddr*"
  CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCMAKE_INSTALL_PREFIX=C:/projects/build-cares/test_install -DCARES_STATIC_PIC=ON -G Ninja"
  CONFIG_OPTS: "--disable-shared"
  MAKE: make
  DIST: Windows

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: true
      max-parallel: 2
      matrix:
        include:
          - { msystem: CLANG64, env: clang-x86_64, extra_packages: "mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-clang-analyzer" }
          - { msystem: MINGW64, env: x86_64,       extra_packages: "mingw-w64-x86_64-gcc"                                               }
    defaults:
      run:
        shell: msys2 {0}
    name: ${{ matrix.msystem }}
    steps:
      - name: Install MSYS2 and base packages
        uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2.32.0
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            autoconf
            autoconf-archive
            automake
            libtool
            make
            mingw-w64-${{ matrix.env }}-cmake
            mingw-w64-${{ matrix.env }}-ninja
            mingw-w64-${{ matrix.env }}-gtest
            mingw-w64-${{ matrix.env }}-openssl
            mingw-w64-${{ matrix.env }}-lldb
            mingw-w64-${{ matrix.env }}-gdb
            ${{ matrix.extra_packages }}
      - name: Checkout c-ares
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: "CMake: build and test c-ares"
        env:
          BUILD_TYPE: CMAKE
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          TEST_DEBUGGER: ${{ ( matrix.msystem == 'CLANG32' || matrix.msystem == 'CLANG64' ) && 'lldb' || 'gdb' }}
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: (crypto/DoT) build and test c-ares"
        env:
          BUILD_TYPE: CMAKE
          # Pin to OpenSSL: on Windows the crypto backend auto-selects Schannel,
          # but this leg (with the mingw OpenSSL package installed) exercises the
          # OpenSSL backend under GCC/Clang.  Schannel is validated by the MSVC
          # workflow.
          CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCMAKE_INSTALL_PREFIX=C:/projects/build-cares/test_install -DCARES_STATIC_PIC=ON -DCARES_CRYPTO=ON -DCARES_CRYPTO_BACKEND=openssl -G Ninja"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          TEST_DEBUGGER: ${{ ( matrix.msystem == 'CLANG32' || matrix.msystem == 'CLANG64' ) && 'lldb' || 'gdb' }}
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "Autotools: (crypto/DoT) build and test c-ares"
        env:
          BUILD_TYPE: autotools
          # Exercises the autotools+OpenSSL *static* crypto link under GCC/Clang
          # on mingw.  Note: --disable-shared means this does NOT gate the
          # -no-undefined / .la dependency_libs propagation the libcares_la_LIBADD
          # fix motivated (arestest_LDADD carries the crypto libs directly, and
          # only a downstream external static consumer would hit that path).  The
          # mingw OpenSSL pkg-config files are on the default search path.
          CONFIG_OPTS: "--disable-shared --enable-cares-crypto"
          TEST_DEBUGGER: ${{ ( matrix.msystem == 'CLANG32' || matrix.msystem == 'CLANG64' ) && 'lldb' || 'gdb' }}
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "Autotools: build and test c-ares"
        env:
          BUILD_TYPE: autotools
          TEST_DEBUGGER: ${{ ( matrix.msystem == 'CLANG32' || matrix.msystem == 'CLANG64' ) && 'lldb' || 'gdb' }}
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: UBSAN: build and test c-ares"
        # Bogus alignment errors on i686, so lets not run UBSAN on i686.
        if: ${{ matrix.msystem == 'CLANG64' }}
        env:
          BUILD_TYPE: "ubsan"
          # Enable crypto so the DoT tests run under UBSAN (OpenSSL backend)
          CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCMAKE_INSTALL_PREFIX=C:/projects/build-cares/test_install -DCARES_STATIC_PIC=ON -DCARES_CRYPTO=ON -DCARES_CRYPTO_BACKEND=openssl -G Ninja"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          CFLAGS: "-fsanitize=undefined -fno-sanitize-recover"
          CXXFLAGS: "-fsanitize=undefined -fno-sanitize-recover"
          LDFLAGS: "-fsanitize=undefined"
          TEST_DEBUGGER: "none"
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: ASAN: build and test c-ares"
        # Bogus alignment errors on i686, so lets not run UBSAN on i686.
        if: ${{ matrix.msystem == 'CLANG64' || matrix.msystem == 'CLANG32' }}
        env:
          BUILD_TYPE: "asan"
          # Enable crypto so the DoT tests run under ASAN.  Pin to the OpenSSL
          # backend (as the msys2 CMake crypto leg does); Schannel is validated
          # by the MSVC workflow.
          CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCMAKE_INSTALL_PREFIX=C:/projects/build-cares/test_install -DCARES_STATIC_PIC=ON -DCARES_CRYPTO=ON -DCARES_CRYPTO_BACKEND=openssl -G Ninja"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          CFLAGS: "-fsanitize=address"
          CXXFLAGS: "-fsanitize=address"
          LDFLAGS: "-fsanitize=address"
          TEST_DEBUGGER: "none"
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "Autotools: Static Analyzer: build c-ares"
        if: ${{ matrix.msystem == 'CLANG64' || matrix.msystem == 'CLANG32' }}
        # Cmake won't work because it somehow mangles linker args and it can't find core windows libraries
        # Must build static only with autotools otherwise libtool creates a wrapper with reportable issues
        # That means we can't use './ci/build.sh' since it uses CMake
        run: |
          autoreconf -fi
          mkdir build_analyze
          cd build_analyze
          # --enable-cares-crypto so the analyzer covers the DoT/Schannel backend
          # (auto-selected on Windows); this is the only clang static-analysis
          # coverage of the Schannel code (MSVC legs don't run scan-build).
          scan-build --use-cc=clang --use-c++=clang++ -v ../configure --enable-static --disable-shared --disable-tests --enable-cares-crypto
          scan-build --use-cc=clang --use-c++=clang++ -v make -j3
          ./src/tools/adig.exe www.google.com
          ./src/tools/ahost.exe www.google.com
