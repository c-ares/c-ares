name: MacOS
on:
  push:
    branches:
      - main
      - 'v*'
  pull_request:

concurrency:
  group: ${{ github.ref }}-macos
  cancel-in-progress: true

env:
  TEST_FILTER: "-v --gtest_filter=-*LiveSearchTXT*:*LiveSearchANY*:*LiveGetLocalhostByAddr*"
  CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCARES_STATIC_PIC=ON -G Ninja"
  MAKE: make

jobs:
  build:
    runs-on: macos-latest
    name: "MacOS"
    steps:
      - name: Install packages
        run: |
          brew uninstall cmake || true
          brew install cmake googletest llvm autoconf automake libtool make ninja openssl@3
      - name: Checkout c-ares
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: "Make sure TCP FastOpen is enabled"
        run: sudo sysctl net.inet.tcp.fastopen=3
      - name: "CMake: build and test c-ares"
        env:
          BUILD_TYPE: CMAKE
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          TEST_DEBUGGER: lldb
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: (crypto/DoT) build and test c-ares"
        env:
          BUILD_TYPE: CMAKE
          # Exercises the OpenSSL backend and the macOS Security.framework
          # trust-anchor loading path, and runs the DoT mock tests.  Point at
          # brew's OpenSSL so CMake doesn't pick up the system LibreSSL.
          CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCARES_STATIC_PIC=ON -DCARES_CRYPTO=ON -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 -G Ninja"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          TEST_DEBUGGER: lldb
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "Autotools: (crypto/DoT) build and test c-ares"
        env:
          BUILD_TYPE: autotools
          # Gates the autotools+OpenSSL link on macOS: CARES_CRYPTO_LIBS carries
          # the Security/CoreFoundation frameworks, and libtool's two-token
          # "-framework X" handling in the .la dependency_libs is fragile.
          # arestest is itself a libcares consumer, so its link would fail if the
          # crypto libs/frameworks weren't recorded -- the CMake crypto leg does
          # not exercise this path.  Point pkg-config at brew's OpenSSL so
          # PKG_CHECK_MODULES finds it instead of the system LibreSSL.
          CONFIG_OPTS: "--enable-cares-crypto"
          PKG_CONFIG_PATH: "/opt/homebrew/opt/openssl@3/lib/pkgconfig"
          TEST_DEBUGGER: lldb
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "Autotools: build and test c-ares"
        env:
          BUILD_TYPE: autotools
          TEST_DEBUGGER: lldb
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: UBSAN: build and test c-ares"
        env:
          BUILD_TYPE: "ubsan"
          CC: "clang"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          CFLAGS: "-fsanitize=undefined -fno-sanitize-recover"
          CXXFLAGS: "-fsanitize=undefined -fno-sanitize-recover"
          LDFLAGS: "-fsanitize=undefined"
          TEST_DEBUGGER: "none"
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: ASAN: build and test c-ares"
        env:
          BUILD_TYPE: "asan"
          CC: "clang"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          CFLAGS: "-fsanitize=address"
          CXXFLAGS: "-fsanitize=address"
          LDFLAGS: "-fsanitize=address"
          TEST_DEBUGGER: "none"
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "Cmake: Static Analyzer: build c-ares"
        env:
          BUILD_TYPE: "analyze"
          CC: "clang"
          # Enable crypto so the static analyzer covers the DoT/OpenSSL backend.
          CMAKE_FLAGS: "-DCARES_WERROR=ON -DCMAKE_BUILD_TYPE=DEBUG -DCARES_STATIC=ON -DCARES_STATIC_PIC=ON -DCARES_CRYPTO=ON -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 -G Ninja"
          SCAN_WRAP: "/opt/homebrew/opt/llvm/bin/scan-build-py -v --status-bugs"
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=OFF"
          TEST_DEBUGGER: "lldb"
        run: |
          ./ci/build.sh
          ./ci/test.sh
      - name: "CMake: No TCP FastOpen"
        env:
          BUILD_TYPE: CMAKE
          CMAKE_TEST_FLAGS: "-DCARES_BUILD_TESTS=ON"
          TEST_DEBUGGER: lldb
        run: |
          sudo sysctl net.inet.tcp.fastopen=0
          ./ci/build.sh
          ./ci/test.sh
